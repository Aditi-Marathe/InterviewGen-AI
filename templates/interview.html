<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Interview Question</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="{{ url_for('static', filename='js/script.js') }}"></script>
</head>
<body class="bg-gradient-to-r from-green-400 to-blue-500 min-h-screen flex items-center justify-center">
<div class="bg-white p-8 rounded-xl shadow-lg w-2/3 animate-fadeIn">
    <h2 class="text-2xl font-bold mb-4">Answer the question:</h2>
    <p class="mb-4 text-lg">{{ question }}</p>
    <form method="POST">
        <textarea id="answer" name="answer" rows="4" class="w-full p-3 border rounded-lg mb-4"></textarea>
        <button type="submit" class="bg-green-600 text-white p-3 rounded-lg hover:bg-green-700 transition">Submit Answer</button>
        <button type="button" onclick="startRecording()" class="ml-4 bg-blue-600 text-white p-3 rounded-lg hover:bg-blue-700 transition">🎤 Voice Answer</button>
    </form>
</div>
</body>
</html>
